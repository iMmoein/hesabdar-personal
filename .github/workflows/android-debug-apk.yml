name: Android Debug APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
          accept-android-sdk-licenses: true

      - name: Install dependencies
        run: npm ci

      - name: Ensure Android asset directories exist
        run: |
          mkdir -p android/app/src/main/assets/public
          mkdir -p android/app/src/main/res
          ls -la android/app/src/main

      - name: Validate Capacitor config
        run: |
          if [ ! -f capacitor.config.json ]; then
            cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.hesabdar.personal",
            "appName": "حسابدار شخصی",
            "webDir": "dist"
          }
          EOF
          fi
          cat capacitor.config.json

      - name: Build Vite app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Run Capacitor doctor
        run: npx cap doctor || true

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hesabdar-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
