name: Android Debug APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
          accept-android-sdk-licenses: true

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Force valid Capacitor configuration
        run: |
          echo "Current directory:"
          pwd

          echo "Root files:"
          ls -la

          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.hesabdar.personal",
            "appName": "حسابدار شخصی",
            "webDir": "dist"
          }
          EOF

          echo "Generated Capacitor config:"
          cat capacitor.config.json

          node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('capacitor.config.json','utf8')); if (!c.appId) throw new Error('appId missing'); if (!c.appName) throw new Error('appName missing'); if (!c.webDir) throw new Error('webDir missing'); console.log('Capacitor config valid:', c);"

          npx cap doctor

      - name: Setup Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

          npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hesabdar-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
